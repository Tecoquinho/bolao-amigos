spring:
  datasource:
    url: jdbc:h2:mem:bolao;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  snapshots:
    enabled: false
    directory: ${java.io.tmpdir}/bolao-test-snapshots
